<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — RideShare</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <button class="brand-button" onclick="location.href='/'">RideShare</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card fade-up">
        <div class="auth-logo">
          <div class="auth-logo-icon"></div>
          RideShare
        </div>
        <h1>Create your account</h1>
        <p class="auth-subtitle">Join thousands of commuters today. It's free.</p>

        <form class="auth-form" id="signup-form" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Jane Smith" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required autocomplete="new-password" minlength="6" />
          </div>

          <div class="form-group">
            <label>I am a…</label>
            <div class="role-selector">
              <div class="role-option">
                <input type="radio" name="userType" id="role-passenger" value="passenger" required />
                <label class="role-label" for="role-passenger">
                  <span class="role-icon">🧳</span>
                  <span class="role-name">Passenger</span>
                  <span class="role-desc">Find & book rides</span>
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="userType" id="role-driver" value="driver" required />
                <label class="role-label" for="role-driver">
                  <span class="role-icon">🚗</span>
                  <span class="role-name">Driver</span>
                  <span class="role-desc">Offer rides & earn</span>
                </label>
              </div>
            </div>
          </div>

          <p class="error-msg" id="error-msg"></p>
          <button type="submit" class="button primary-button full-width btn-lg" id="submit-btn">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="/pages/login.html">Sign in →</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      buildNav(auth, 'signup');
      if (auth.isAuth) { window.location.href = '/'; return; }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('visible');

      const userType = document.querySelector('input[name="userType"]:checked')?.value;
      if (!userType) {
        errEl.textContent = 'Please select your account type.';
        errEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            userType
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        auth.save(data.token, data.user);
        toast.success('Account created! Welcome aboard 🎉');
        setTimeout(() => {
          window.location.href = data.user.userType === 'driver' ? '/pages/dashboard.html' : '/pages/passenger-dashboard.html';
        }, 700);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
