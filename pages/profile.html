<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — RideShare</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <button class="brand-button" onclick="location.href='/'">RideShare</button>
      <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header fade-up">
        <h1>My Profile</h1>
        <p>Manage your account information.</p>
      </div>

      <div class="profile-grid fade-up delay-1">
        <!-- Sidebar -->
        <div class="profile-sidebar">
          <div class="card" style="text-align:center">
            <div class="profile-avatar" id="avatar-initials" style="margin:0 auto 1rem">?</div>
            <h2 id="profile-name" style="font-size:1.25rem">Loading…</h2>
            <p class="text-muted text-sm" id="profile-email">—</p>
            <div class="mt-2">
              <span class="badge" id="profile-role-badge">—</span>
            </div>
            <div class="divider"></div>
            <div class="flex flex-col gap-1">
              <div id="quick-links"></div>
              <button class="button danger-button full-width mt-2" onclick="if(confirm('Log out?')) auth.logout()">Sign Out</button>
            </div>
          </div>
        </div>

        <!-- Main content -->
        <div>
          <div class="card fade-up delay-2" id="stats-card" style="margin-bottom:1.5rem;display:none">
            <h3 class="mb-2">Activity Summary</h3>
            <div id="activity-stats" class="stats-row" style="margin-bottom:0"></div>
          </div>

          <div class="card fade-up delay-3">
            <h3 class="mb-2">Account Details</h3>
            <div id="account-details">
              <div class="loading-state"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.requireAuth()) return;
      buildNav(auth, 'profile');
      await loadProfile();
    });

    async function loadProfile() {
      try {
        const { user } = await auth.api('/api/auth/me');
        const initial = (user.name || 'U')[0].toUpperCase();
        document.getElementById('avatar-initials').textContent = initial;
        document.getElementById('profile-name').textContent = user.name;
        document.getElementById('profile-email').textContent = user.email;

        const badge = document.getElementById('profile-role-badge');
        badge.textContent = user.userType;
        badge.className = 'badge ' + (user.userType === 'driver' ? 'badge-active' : 'badge-confirmed');

        // Quick links
        const links = document.getElementById('quick-links');
        if (user.userType === 'driver') {
          links.innerHTML = `
            <a href="/pages/dashboard.html" class="button ghost-button full-width mb-1">Dashboard</a>
            <a href="/pages/my-rides.html" class="button ghost-button full-width mb-1">My Rides</a>
            <a href="/pages/offer-ride.html" class="button ghost-button full-width">Offer Ride</a>
          `;
          await loadDriverStats(user);
        } else {
          links.innerHTML = `
            <a href="/pages/passenger-dashboard.html" class="button ghost-button full-width mb-1">Dashboard</a>
            <a href="/pages/my-bookings.html" class="button ghost-button full-width mb-1">My Bookings</a>
            <a href="/pages/search-ride.html" class="button ghost-button full-width">Find Rides</a>
          `;
          await loadPassengerStats();
        }

        // Account details table
        document.getElementById('account-details').innerHTML = `
          <div style="display:grid;gap:1rem">
            ${row('Full Name', user.name)}
            ${row('Email Address', user.email)}
            ${row('Account Type', user.userType.charAt(0).toUpperCase() + user.userType.slice(1))}
            ${row('Member Since', fmtDate(user.createdAt || new Date()))}
          </div>
          <p class="text-muted text-sm mt-2">To update your account details, please contact support.</p>
        `;
      } catch (e) { toast.error('Failed to load profile: ' + e.message); }
    }

    function row(label, value) {
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--card-border)">
          <span class="text-muted text-sm">${label}</span>
          <span class="font-bold text-sm">${value}</span>
        </div>`;
    }

    async function loadDriverStats(user) {
      try {
        const rides = await auth.api('/api/rides/my-rides?status=active');
        const statsCard = document.getElementById('stats-card');
        document.getElementById('activity-stats').innerHTML = `
          <div class="stat-card"><div class="stat-label">Active Rides</div><div class="stat-value">${rides.length}</div></div>
          <div class="stat-card"><div class="stat-label">Total Seats</div><div class="stat-value">${rides.reduce((s,r)=>s+r.totalSeats,0)}</div></div>
        `;
        statsCard.style.display = 'block';
      } catch {}
    }

    async function loadPassengerStats() {
      try {
        const bookings = await auth.api('/api/bookings/my-bookings');
        const statsCard = document.getElementById('stats-card');
        document.getElementById('activity-stats').innerHTML = `
          <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value">${bookings.length}</div></div>
          <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value">${bookings.filter(b=>b.status==='confirmed').length}</div></div>
          <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value">${fmtCur(bookings.filter(b=>b.status==='confirmed').reduce((s,b)=>s+(b.totalPrice||0),0))}</div></div>
        `;
        statsCard.style.display = 'block';
      } catch {}
    }
  </script>
</body>
</html>
